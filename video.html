    </div>
    <div class="smallbox">

        </video>
    </div>
</main>

<script>
    function setupVideos() {
        const bigVideo = document.getElementById('bigVideo');

        // Prevent small videos from being paused when the big video plays
        bigVideo.addEventListener('play', () => {
            // No need to pause small videos
        });
    }

    document.addEventListener('DOMContentLoaded', setupVideos);
</script>
